name: Build strona-www

on:
  push:
    paths:
      - 'terraform/**'
      - 'strona-www/**'
  pull_request:
    paths:
      - 'terraform/**'
      - 'strona-www/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      webapp: ${{ steps.filter.outputs.webapp }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
            webapp:
              - 'strona-www/**'
            migrations:
              - 'strona-www/migrations/**'

  terraform:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_postgres_admin_login: ${{ secrets.POSTGRES_ADMIN_LOGIN }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_webapp_name: ${{ vars.WEBAPP_NAME }}
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
    outputs:
      postgres_fqdn: ${{ steps.expose_outputs.outputs.postgres_fqdn }}
      postgres_db_name: ${{ steps.expose_outputs.outputs.postgres_db_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login for Terraform
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
      
      - name: Expose Terraform Outputs
        id: expose_outputs
        run: |
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> $GITHUB_OUTPUT
          echo "postgres_db_name=$(terraform output -raw postgres_db_name)" >> $GITHUB_OUTPUT

  build:
    needs: [changes, terraform]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.terraform.result != 'failure' &&
      (needs.changes.outputs.terraform == 'true' || needs.changes.outputs.webapp == 'true' || needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: strona-www
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: strona-www/package-lock.json

      - name: Install dependencies
        run: npm ci
      
      - name: Run Unit Tests
        run: npm run test:unit

      - name: Build web app
        run: npm run build

      - name: Prune development dependencies
        run: npm prune --omit=dev

      - name: Package build output
        run: zip -r ../strona-www-webapp.zip build migrations package.json package-lock.json node_modules

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: strona-www-webapp
          path: strona-www-webapp.zip
          if-no-files-found: error

  migrate:
    needs: [build, terraform] # ⬅️ POPRAWIONE: migrate musi słuchać terraform, żeby mieć dostęp do outputs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: strona-www
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies (Including node-pg-migrate)
        run: npm ci

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgres://${{ secrets.POSTGRES_ADMIN_LOGIN }}:${{ secrets.POSTGRES_ADMIN_PASSWORD }}@${{ needs.terraform.outputs.postgres_fqdn }}/${{ needs.terraform.outputs.postgres_db_name }}?ssl=true
        run: npx node-pg-migrate up

  test:
    needs: [migrate, terraform] # ⬅️ POPRAWIONE: test musi słuchać bezpośrednio terraform, inaczej straci dostęp do zmiennych!
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: strona-www
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run End-to-End Tests
        env:
          DATABASE_URL: postgres://${{ secrets.POSTGRES_ADMIN_LOGIN }}:${{ secrets.POSTGRES_ADMIN_PASSWORD }}@${{ needs.terraform.outputs.postgres_fqdn }}/${{ needs.terraform.outputs.postgres_db_name }}?ssl=true
        run: npm run test:e2e

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login for deployment
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: strona-www-webapp

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.WEBAPP_NAME }}
          package: strona-www-webapp.zip